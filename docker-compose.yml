version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: cctv_ai_mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: cctv_ai
    networks:
      - cctv_network

  redis:
    image: redis:7-alpine
    container_name: cctv_ai_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - cctv_network

volumes:
  mongo_data:
    driver: local
  redis_data:
    driver: local

networks:
  cctv_network:
    driver: bridge
